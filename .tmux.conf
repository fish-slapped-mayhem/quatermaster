# ~/.tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Don’t exit tmux when the last session is closed
#set -g detach-on-destroy off
# When destroy switches sessions, prefer the most recently used
set -g detach-on-destroy previous

# Add shortcuts for new and kill sessions
# bind X confirm-before kill-session

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 100000

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# Set xterm keys for better compatibility with modern terminals
setw -g xterm-keys on

# Enable extended keys for better support of modern terminal features
set -g extended-keys on

# Not available on TMUX prior to 3.3, which not all devcontainers are getting yet
# set -g extended-keys-format csi-u

# ============================================
# KEY BINDINGS
# ============================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Enable status bar
set -g status on

# Status bar position
set -g status-position top

# Status bar colors
set -g status-style 'bg=#13161d fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 100

# Status bar content
set -g status-left "#[fg=#00e68a,bold] #S #[fg=#30363d]|"
set -g status-right "#{cpu_fg_color}CPU:#{cpu_percentage} #{ram_fg_color}RAM:#{ram_percentage}#[fg=#30363d]|#(hostname -I | awk '{print \$1}')|#[fg=#00e68a]%H:%M:%SUTC #[fg=#8b949e]%Y-%b-%d#[fg=#30363d]|#{tmux_mode_indicator}"

# Window status
setw -g window-status-format '#[fg=#00e68a] #I#[fg=#30363d]:#[fg=pink]#W#[fg=#30363d]:#[fg=cyan]#H '
setw -g window-status-current-format '#[fg=#00e68a,bold] #I#[fg=#30363d]:#[fg=pink,bold]#W#[fg=#30363d]:#[fg=cyan,bold]#H '

# Set window titles in terminal tab
set -g set-titles on
set -g set-titles-string "#S / #W"

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#00e68a'

# Pane status (show current command in pane border)
set -g pane-border-status top
set -g pane-border-format " #{pane_current_command} "

# Message styling
set -g message-style 'bg=#00e68a fg=#000000 bold'

# Refresh status every second
set -g status-interval 1

# Automatically renumber windows after closing one
set -g renumber-windows on

# ============================================
# COPY MODE
# ============================================

# Integrate with system clipboard
set -g set-clipboard on

# Allow passthrough for OSC sequences (for better clipboard and title integration)
set -g allow-passthrough on

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection

# The following do not work in devcontainers because they rely on external clipboard utilities
# that may not be installed, and tmux's built-in clipboard integration is sufficient for most
# use cases. If you want to enable them, make sure to install the appropriate clipboard utility
# (e.g., xclip for Linux) in your devcontainer.  They are kept as a NOTE as I sometimes copy
# settings files between my host and devcontainer configurations as I try and like new things.

# macOS clipboard integration (add to ~/.tmux.conf)
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# Hit prefix + I to fetch the plugin and source it. You should now be able to use the plugin.

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Ultimate solution to enable seamless mouse scroll in tmux.
# https://github.com/noscript/tmux-mighty-scroll
set -g @plugin 'noscript/tmux-mighty-scroll'

# battery, see https://github.com/tmux-plugins/tmux-battery
# Won't work inside a devcontainer
# set -g @plugin 'tmux-plugins/tmux-battery'

# Kubernetes context, see https://github.com/jonmosco/kube-tmux
# set -g @plugin 'jonmosco/kube-tmux'

# https://github.com/phil/tmux-devcontainers
# set -g @plugin 'phil/tmux-devcontainers'

# https://github.com/tmux-plugins/tmux-sidebar
set -g @plugin 'tmux-plugins/tmux-sidebar'

# https://github.com/anghootys/tmux-ip-address
# set -g @plugin 'anghootys/tmux-ip-address'

# https://github.com/tmux-plugins/tmux-cpu
set -g @plugin 'tmux-plugins/tmux-cpu'

# https://github.com/thewtex/tmux-mem-cpu-load
# set -g @plugin 'thewtex/tmux-mem-cpu-load'

# https://github.com/MunifTanjim/tmux-mode-indicator
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
# prompt to display when tmux prefix key is pressed
set -g @mode_indicator_prefix_prompt ' WAIT '
# prompt to display when tmux is in copy mode
set -g @mode_indicator_copy_prompt ' COPY '
# prompt to display when tmux has synchronized panes
set -g @mode_indicator_sync_prompt ' SYNC '
# prompt to display when tmux is in normal mode
set -g @mode_indicator_empty_prompt ' TMUX '
# style values for prefix prompt
set -g @mode_indicator_prefix_mode_style 'bg=blue,fg=black'
# style values for copy prompt
set -g @mode_indicator_copy_mode_style 'bg=yellow,fg=black'
# style values for sync prompt
set -g @mode_indicator_sync_mode_style 'bg=red,fg=black'
# style values for empty prompt
set -g @mode_indicator_empty_mode_style 'bg=cyan,fg=black'

# https://github.com/ayzenquwe/tmux-ping
# set -g @plugin 'ayzenquwe/tmux-ping'
# set -g @ping_host '8.8.8.8'

# ============================================
# THEMES (via TPM)
# ============================================

# https://github.com/catppuccin/tmux
# See https://github.com/catppuccin/tmux/tags for additional tags
# set -g @plugin 'catppuccin/tmux#v2.3.0'

# https://github.com/dracula/tmux/blob/master/INSTALL.md
# set -g @plugin 'dracula/tmux'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
run '~/clone/path/mighty-scroll.tmux'